server.port=${PORT:8081}
spring.application.name=accounts-service
# Database Connection
spring.datasource.url=jdbc:mysql://mysql:3306/accountsdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

resilience4j.circuitbreaker.instances.transactionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.transactionService.sliding-window-size=5
resilience4j.circuitbreaker.instances.transactionService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.transactionService.permitted-number-of-calls-in-half-open-state=2

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
# Register using IP (helps local dev)
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.banking=DEBUG

management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name},%X{traceId}]