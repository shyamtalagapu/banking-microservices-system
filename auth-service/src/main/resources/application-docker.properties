server.port=${PORT:8083}
spring.application.name=auth-service

# Database Connection
spring.datasource.url=jdbc:mysql://mysql:3306/userdetails?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Shyam@2712
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.banking=DEBUG

management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name},%X{traceId}]