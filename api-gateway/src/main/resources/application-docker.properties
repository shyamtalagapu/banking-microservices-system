server.port=${PORT:8085}
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
management.endpoints.web.exposure.include=*

spring.cloud.gateway.routes[0].id=accounts-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNTS-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**

spring.cloud.gateway.routes[1].id=transaction-service
spring.cloud.gateway.routes[1].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/transactions/**

spring.cloud.gateway.routes[2].id=customer-service
spring.cloud.gateway.routes[2].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/customers/**  
#jwt.secret=mySuperSecretKey123456789
#jwt.expiration=3600000
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name},%X{traceId}]